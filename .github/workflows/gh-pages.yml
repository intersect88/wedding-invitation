name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # prevent checkout from persisting the default GITHUB_TOKEN credentials
          # so the action can use the provided personal token for pushing
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # Vite requires Node 20.19+ or 22.12+
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          # Use the personal token (PAT) stored in repository secrets so commits
          # are attributed to your user instead of github-actions[bot]
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # Ensure the custom domain is written to the gh-pages branch
          cname: ornellaegenny10giugno2026.it
